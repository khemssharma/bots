name: Automate Unfollow Non-Reciprocal X.com Accounts

on:
  schedule:
    # Run every 8 hours
    - cron: "0 0/8 * * *"
  workflow_dispatch: # Allows manual runs from GitHub Actions UI

jobs:
  unfollow-x-non-reciprocal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        run: npm install puppeteer-core

      - name: Run X.com Unfollow Script
        run: node unfollow-x.js
        env:
          X_SCREEN_NAME: ${{ secrets.X_SCREEN_NAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          EXCLUDED_USERS: ${{ secrets.X_EXCLUDED_USERS }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
